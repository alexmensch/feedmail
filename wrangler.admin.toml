name = "feedmail-admin"
main = "src/admin/worker.js"
compatibility_date = "2026-02-27"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true
workers_dev = true
preview_urls = false

[build]
command = "node scripts/precompile-templates.mjs"

[[d1_databases]]
binding = "DB"
database_name = "feedmail"
database_id = "YOUR_DATABASE_ID"

[[routes]]
pattern = "YOUR_DOMAIN/admin/*"
zone_name = "YOUR_DOMAIN"

[vars]
DOMAIN = "YOUR_DOMAIN"

# Secrets (set via `wrangler secret put`):
# None — credentials are stored in D1

[observability.logs]
enabled = true
