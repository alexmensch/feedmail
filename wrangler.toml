name = "feedmail"
main = "src/index.js"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]
account_id = "ecd2a3d65ecc1018f93da07542223581"

[build]
command = "node scripts/precompile-templates.mjs"

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "feedmail"
database_id = "5a427f97-0e66-499c-85e3-687980dab09c"

[[routes]]
pattern = "feedmail.cc"
custom_domain = true

[vars]
SITES = '''
[
  {
    "id": "alxm.me",
    "url": "https://alxm.me",
    "name": "Alex Marshall",
    "fromEmail": "hello@newsletter.alxm.me",
    "fromName": "Alex Marshall",
    "replyTo": "hello@alxm.me",
    "corsOrigins": ["https://alxm.me"],
    "feeds": ["https://alxm.me/writing.atom"]
  }
]
'''

BASE_URL = "https://feedmail.cc"
VERIFY_MAX_ATTEMPTS = "3"
VERIFY_WINDOW_HOURS = "24"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY
# ADMIN_API_KEY

[observability.logs]
enabled = true
