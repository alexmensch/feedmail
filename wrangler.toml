name = "feedmail"
main = "src/index.js"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]
account_id = "ecd2a3d65ecc1018f93da07542223581"
upload_source_maps = true

[build]
command = "node scripts/precompile-templates.mjs"

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "feedmail"
database_id = "5a427f97-0e66-499c-85e3-687980dab09c"

[[routes]]
pattern = "newsletter.alxm.me/api/*"
zone_name = "newsletter.alxm.me"

[vars]
CHANNELS = '''
[
  {
    "id": "alxm.me",
    "siteUrl": "https://alxm.me/writing",
    "siteName": "Alex Marshall",
    "fromUser": "hello",
    "fromName": "Alex Marshall",
    "replyTo": "hello@alxm.me",
    "companyName": "Thoughtful Design Ltd (№15642102)",
    "companyAddress": "82A James Carter Road, Mildenhall IP28 7DE, England, United Kingdom",
    "corsOrigins": ["https://alxm.me"],
    "feeds": [{"name": "Writing", "url": "https://alxm.me/writing.atom"}]
  }
]
'''

DOMAIN = "newsletter.alxm.me"
VERIFY_MAX_ATTEMPTS = "3"
VERIFY_WINDOW_HOURS = "24"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY
# ADMIN_API_KEY

[observability.logs]
enabled = true
