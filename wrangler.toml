name = "feedmail"
main = "src/index.js"
compatibility_date = "2026-02-27"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[build]
command = "node scripts/precompile-templates.mjs"

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "feedmail"
database_id = "YOUR_DATABASE_ID"

[[routes]]
pattern = "YOUR_DOMAIN/api/*"
zone_name = "YOUR_DOMAIN"

[vars]
DOMAIN = "YOUR_DOMAIN"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY
# ADMIN_API_KEY

[observability.logs]
enabled = true
